<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementsByTagName()</title>
</head>
<body>
    <ul id="menu">
        <li class="menu-item">
            <span>Trang chủ</span>
        </li>
        <li class="menu-item">Về shop</li>
        <li class="menu-item">Thời trang nữ</li>
        <li class="menu-item">Thời trang nam</li>
        <li class="menu-item">Liên hệ</li>
    </ul>

    <script>
        let liTags = document.getElementsByTagName("li");
        console.log(liTags);

        for (let i = 0; i < liTags.length; i++) {
            console.log(liTags[i].innerHTML);
        }
    </script>
</body>
</html>
