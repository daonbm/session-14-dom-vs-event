<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.displayButton {
  width: 100%;
  padding: 25px;
  background-color: coral;
  color: white;
  font-size: 25px;
  box-sizing: border-box;
}
</style>
</head>
<body>

<button onclick="addOrRemoveCssOfBtn()">Thêm/xóa CSS của nút bấm</button>

<div id="greeting">Hello KS25-CNTT3</div>

<script>
function addOrRemoveCssOfBtn() {
   var element = document.getElementById("greeting");
   element.classList.toggle("displayButton");
}
</script>

</body>
</html>
