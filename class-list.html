<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class List Methods</title>
    <style>
        .ks25 {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <ul id="menu">
        <li class="menu-item">Trang chủ</li>
        <li class="menu-item">Về shop</li>
        <li class="menu-item">Thời trang nữ</li>
        <li class="menu-item">Thời trang nam</li>
        <li class="menu-item">Liên hệ</li>
    </ul>

    <script>
        let liTags = document.getElementsByClassName("menu-item");
        console.log(liTags);

        // add() method in classList
        for (let i = 0; i < liTags.length; i++) {
            liTags[i].classList.add("ks25");
        }

        // check if add() method worked
        for (let i = 0; i < liTags.length; i++) {
            console.log(liTags[i].classList);
        }

        // contains() method in classList
        for (let i = 0; i < liTags.length; i++) {
            console.log(liTags[i]);
            if (liTags[i].classList.contains("ks25")) {
                console.log("class ks25 EXISTS in class list of li tag");
            }
        }

        // remove() method in classList
        // for (let i = 0; i < liTags.length; i++) {
        //     console.log(liTags[i].classList.remove("ks25"));
        // }
    </script>
</body>
</html>
